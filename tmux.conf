# ============================================================
# Tmux Configuration
# ============================================================

# -- General --
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g status-interval 5

# -- Key bindings --
# Prefix: Ctrl-a (primary) and Ctrl-b (secondary)
unbind C-b
set -g prefix C-a
bind C-a send-prefix
bind C-b send-prefix

# -- Split panes --
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# -- Navigation --
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# -- Resize panes --
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# -- Copy mode --
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel
setw -g mode-keys vi

# -- Status bar --
set -g status-position bottom
set -g status-bg colour235
set -g status-fg colour137
set -g status-left "#[fg=colour235,bg=colour137,bold] #S #[fg=colour137,bg=colour235,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=colour237,bg=colour235,nobold,nounderscore,noitalics]#[fg=colour137,bg=colour237] %Y-%m-%d  %H:%M #[fg=colour235,bg=colour137,bold] #h "
set -g status-right-length 50
set -g status-left-length 20

# -- Window status --
setw -g window-status-current-format "#[fg=colour235,bg=colour137,bold] #I  #W #[fg=colour137,bg=colour235,nobold,nounderscore,noitalics]"
setw -g window-status-format "#[fg=colour237,bg=colour235,nobold,nounderscore,noitalics]#[fg=colour137,bg=colour237] #I  #W #[fg=colour237,bg=colour235,nobold,nounderscore,noitalics]"
setw -g window-status-separator ""

# -- Pane border --
set -g pane-border-style fg=colour237
set -g pane-active-border-style fg=colour137

# -- Neovim integration --
# Allow true colors
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"